# 生产环境覆盖配置（4核4G 服务器调优 + 安全收紧）
#
# 用法（与基础 compose 叠加）：
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# 相比基础 docker-compose.yml 的改动：
#   1. ES / Neo4j 堆内存降到 512m，适配 4G 内存
#   2. 各容器加内存上限，防单个服务吃爆整机
#   3. 数据库 / ES / Neo4j / Redis 不再对公网暴露端口（仅容器内部互通）
#   4. worker 并发调小，降低内存占用
#   5. web 映射到宿主 80 端口，直接 http://服务器IP 访问
services:
  postgres:
    ports: []                       # 不对外暴露 5432
    deploy:
      resources:
        limits:
          memory: 384m

  elasticsearch:
    ports: []                       # 不对外暴露 9200
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"   # 堆降到 512m
    deploy:
      resources:
        limits:
          memory: 1200m

  neo4j:
    ports: []                       # 不对外暴露 7474/7687
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-cometneo4j}
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_pagecache_size: 256m
    deploy:
      resources:
        limits:
          memory: 1100m

  redis:
    ports: []                       # 不对外暴露 6379
    deploy:
      resources:
        limits:
          memory: 128m

  api:
    ports: []                       # 不直接对外，由 web 容器的 nginx 反代 /api
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    deploy:
      resources:
        limits:
          memory: 512m

  worker:
    # 4G 内存：并发调小，避免多任务同时跑 LLM 撑爆内存
    command: celery -A app.celery_app.celery_app worker -l info -Q default,parse,memory,beat --pool=threads --concurrency=3
    deploy:
      resources:
        limits:
          memory: 512m

  beat:
    deploy:
      resources:
        limits:
          memory: 128m

  web:
    ports:
      - "80:80"                     # 宿主 80 → 容器 80，直接 http://服务器IP 访问
